        * {
            -webkit-user-select: none;

            -webkit-touch-callout: none;
        }

            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;

            background-color: #000000;

            margin: 0; 

            padding: 0; 

            display: flex; 

            justify-content: center; 

            align-items: center; 

            min-height: 100vh; 

            overflow-x: hidden; 

            font-size: 16px;
            line-height: 1;

        } 

 

        #terminal { 

            width: 100%; 

            max-width: 900px; 

            padding: 20px; 

            padding-bottom: 40px;

            text-align: center; 

            white-space: pre-wrap; /* Διατηρεί τα κενά για τα ASCII */ 

        } 

 

        .ascii-art { 

            line-height: 1.0; 

            white-space: pre; 

            margin: 200px auto;
            padding: 0 10px;
            font-size: 12px;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-weight: normal;
            letter-spacing: 0;
            overflow-x: auto;

        }

        @media (max-width: 8000px) {
            .ascii-art {
                font-size: 11px;
                margin: 15px auto;
                padding: 0 5px;
            }
        }

        @media (max-width: 8000px) {
            .ascii-art {
                font-size: 10px;
                margin: 12px auto;
                padding: 0 5px;
            }
        } 

 

        .text-block { 

            margin: 20px auto; 

            max-width: 800px; 

            line-height: 1.5; 

        } 

 

        .options-container { 

            margin-top: 30px; 

            text-align: left; 

            max-width: 700px; 

            margin-left: auto; 

            margin-right: auto; 

        } 

 

        .option { 

            padding: 8px 12px; 

            margin-bottom: 10px; 

            display: block; 

            cursor: pointer;

            transition: all 0.2s ease;

            border: 1px solid transparent;

            border-radius: 4px;

        }

        .option:active {
            transform: scale(0.98);
        }

        .option.clickable {
            border: 1px solid #4ade80;
            padding: 8px 12px;
        }

        .option.clickable:hover {
            background-color: rgba(74, 222, 128, 0.15);
        }

        /* Το highlight του επιλεγμένου αντικειμένου (BG_GREEN + FG_WHITE) */ 

        .option.selected { 

            background-color: #4ade80; 

            color: #000000; 

            padding: 10px 15px;

            border-radius: 4px;

            border: 1px solid #2d7a57;

        } 

 

        .footer { 

            margin-top: 30px; 

            color: #ffffff; /* Αντίστοιχο του FG_WHITE */ 

            font-size: 0.9em;

        } 

        .footer.mobile {
            margin-top: 50px;
        }

        .touch-buttons-container {
            display: none;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .touch-buttons-container.show {
            display: flex;
        }

        .touch-btn {
            padding: 12px 20px;
            background-color: #1e3a2c;
            color: #4ade80;
            border: 2px solid #4ade80;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            min-width: 80px;
            touch-action: manipulation;
        }

        .touch-btn:active {
            background-color: #4ade80;
            color: #000000;
            transform: scale(0.95);
        }

        .touch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .hidden { 

            display: none; 

        } 

        @media (max-width: 768px) {
            body {
                font-size: 14px;
                padding: 0;
            }

            #terminal {
                padding: 15px;
                max-width: 100%;
            }

            .ascii-art {
                font-size: clamp(8px, 1.5vw, 12px);
                line-height: 1;
                margin-bottom: 15px;
            }

            .text-block {

                max-width: 100%;
                font-size: 14px;
                line-height: 1.4;
            }

            .options-container {

                max-width: 100%;
                padding: 0 10px;

            .option {
                padding: 8px 12px;
                margin-bottom: 8px;
                font-size: 13px;
            }

            .option.selected {

            }

            .footer {
                margin-top: 25px;
                font-size: 12px;
            }

            .footer.mobile {
                margin-top: 40px;
            }

            .touch-buttons-container {
                gap: 8px;
                margin-top: 25px;
                padding: 0 10px;
            }

            .touch-btn {
                padding: 10px 16px;
                font-size: 13px;
                min-width: 70px;
                flex: 1;
                min-width: calc(33.333% - 6px);
            }
        }

        @media (max-width: 480px) {
            body {
                font-size: 13px;
            }

            #terminal {
                padding: 12px;
            }

            }

            .touch-btn {
                padding: 9px 14px;
                font-size: 12px;
                min-width: calc(33.333% - 5px);
            }

            .footer {
                margin-top: 20px;
                font-size: 11px;
            }

            .footer.mobile {
                margin-top: 30px;
            }
        }

    </style> 

</head>

        // --- Βοηθητικές Συναρτήσεις --- 

        const terminal = document.getElementById('terminal'); 

 

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms)); 

 

        // Καθαρίζει το terminal 

        function clearTerminal() { 

            terminal.innerHTML = ""; 

        } 

 

        // Περιμένει το πάτημα του Enter (για Desktop) 

        function waitForEnter() { 

            return new Promise(resolve => { 

                const handler = (e) => { 

                    if (e.key === 'Enter') { 

                        document.removeEventListener('keydown', handler); 

                        e.preventDefault(); 

                        resolve(); 

                    } 

                }; 

                document.addEventListener('keydown', handler); 

            }); 

        } 

        // Περιμένει το πάτημα κουμπιού (για Mobile) 

        function waitForButtonClick() { 

            return new Promise(resolve => { 

                const button = document.querySelector('.touch-btn'); 

                if (button) { 

                    button.addEventListener('click', () => { 

                        resolve(); 

                    }, { once: true }); 

                } 

            }); 

        } 

 

        // Εφέ δακτυλογράφησης 

        async function typeText(container, text, delay = 18) { 

            for (let i = 0; i < text.length; i++) { 

                container.innerHTML += text.charAt(i); 

                await sleep(delay); 

            } 

        }

                continueBtn.textContent = 'Συνέχεια →'; 

                continueBtn.onclick = () => resolve(); 

                btnContainer.appendChild(continueBtn); 

                terminal.appendChild(btnContainer); 

 

                return new Promise(resolve => { 

                    continueBtn.onclick = () => resolve(); 

                }); 

            } else { 

                await waitForEnter();

            const updateSelection = () => { 

                optionElements.forEach((el, i) => { 

                    if (i === selectedIdx) el.classList.add('selected'); 

                    else el.classList.remove('selected'); 

                }); 

            }; 

            updateSelection();

 

            return new Promise(resolve => { 

                // Handle click on options (works on both mobile and desktop) 

                optionElements.forEach((optDiv, i) => {

                    optDiv.onclick = (e) => {

                        if (answered) return;

                        answered = true;

                        selectedIdx = i;

                        updateSelection();

                        // Disable all options

                        optionElements.forEach(el => {

                            el.style.pointerEvents = 'none';

                            el.style.opacity = '0.7';

                        });

                        resolve(i);

                    };

                });

 

                // Keyboard navigation for desktop 

                if (!IS_MOBILE) {

                    const handler = (e) => { 

                        if (answered) return;

                        if (e.key === 'ArrowUp') { 

                            selectedIdx = (selectedIdx - 1 + qData.options.length) % qData.options.length; 

                            updateSelection(); 

                            e.preventDefault(); 

                        } else if (e.key === 'ArrowDown') { 

                            selectedIdx = (selectedIdx + 1) % qData.options.length; 

                            updateSelection(); 

                            e.preventDefault(); 

                        } else if (e.key === 'Enter') { 

                            document.removeEventListener('keydown', handler); 

                            answered = true;

                            updateSelection(); 

                            optionElements.forEach(el => {

                                el.style.pointerEvents = 'none';

                                el.style.opacity = '0.7';

                            });

                            e.preventDefault(); 

                            resolve(selectedIdx); 

                        } 

                    }; 

                    document.addEventListener('keydown', handler); 

                }

            }); 

        }

        // --- Κεντρική Ροή (Main Loop) --- 

        async function runGame() { 

            let phariseePoints = 0; 

            let pragmatistPoints = 0; 

            let hippocratesPoints = 0; 

            const total = QUESTIONS.length; 

 

            for (let i = 0; i < total; i++) { 

                const choiceIdx = await askQuestion(i + 1, total, QUESTIONS[i]); 

 

                // Η 3η ερώτηση (index 2) έχει διαφορετική βαθμολόγηση σύμφωνα με τον python κώδικα 

                if (i === 2) { 

                    if (choiceIdx === 0) pragmatistPoints += 1; 

                    else if (choiceIdx === 1) phariseePoints += 1; 

                    else hippocratesPoints += 1; 

                } else { 

                    if (choiceIdx === 0) phariseePoints += 1; 

                    else if (choiceIdx === 1) pragmatistPoints += 1; 

                    else hippocratesPoints += 1; 

                } 

            } 

 

            await showResults(hippocratesPoints, pragmatistPoints, phariseePoints); 

        } 

 

        // Εκκίνηση εφαρμογής 

        async function init() { 

            await startScreen(); 

            await showIntroScenario(); 

            await runGame(); 

        } 

 

        // Αποτροπή scroll όταν πατιούνται τα βελάκια 

        window.addEventListener("keydown", function(e) { 

            if(["ArrowUp","ArrowDown","Space"].indexOf(e.code) > -1) { 

                e.preventDefault(); 

            } 

        }, false); 

 

        init(); 

    </script>
